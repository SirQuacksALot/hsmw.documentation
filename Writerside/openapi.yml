      operationId: canteen_reviews_create
      description: |-
        CRUD for canteen reviews.

        Query params:
          - canteen_id: external canteen menu id (string). Filters list to a specific dish instance.

        Rules:
          - One review per user per menu enforced by DB UniqueConstraint.
          - When listing, show the current user's review first (if any), then newest first.
