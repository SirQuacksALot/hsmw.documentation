    get:
      operationId: canteen_images_list
      description: |-
        Create or Delete images for reviews.
        Note: uploader is taken from the authenticated user (session -> later with JWT).
      tags:
      - canteen
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
